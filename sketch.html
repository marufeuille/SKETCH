<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケッチアプリ</title>
  <link rel="stylesheet" href="css/sketch.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>スケッチアプリ</h1>
    </header>

    <div class="notebook-content">
      <div class="date-display">
        <input type="date" id="entry-date" name="entry-date">
      </div>
      <div class="action-buttons">
        <button id="add-photo-button" class="action-button">写真を追加</button>
        <button id="save-button" class="action-button">保存</button>
        <input type="file" id="photo-upload" accept="image/*" style="display: none;">
      </div>
      <div class="drawing-area" id="drawing-area">
        <div class="drawing-toolbar">
          <div class="tool-group">
            <button class="tool-button active" data-tool="pen">ペン</button>
            <button class="tool-button" data-tool="eraser">けしゴム</button>
            <button class="tool-button" data-tool="select">選択</button>
          </div>
          <div class="color-palette">
            <button class="color-button active" data-color="#000000" style="background-color: #000000;"></button>
            <button class="color-button" data-color="#FF0000" style="background-color: #FF0000;"></button>
            <button class="color-button" data-color="#00FF00" style="background-color: #00FF00;"></button>
            <button class="color-button" data-color="#0000FF" style="background-color: #0000FF;"></button>
            <button class="color-button" data-color="#FFFF00" style="background-color: #FFFF00;"></button>
            <button class="color-button" data-color="#FF00FF" style="background-color: #FF00FF;"></button>
          </div>
          <div class="size-selector">
            <button class="size-button" data-size="2">●</button>
            <button class="size-button active" data-size="5">●●</button>
            <button class="size-button" data-size="10">●●●</button>
          </div>
          <button id="clear-canvas" class="clear-button">クリア</button>
        </div>
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- JavaScriptファイルの読み込み -->
  <script src="js/sketch.js"></script>
  <script src="js/drawing.js"></script>
  <script src="js/photo.js"></script>
  <script src="js/save.js"></script>
</body>
</html>
